				// 获取最近发布文章的路径并渲染
				$.ajax({
					type:"get", 
					url: "assets/json/recentPost.json", 
					dataType:"json",
					success:function(datas) {
						var recentPostBox = document.getElementById("recentPostBox");
						for(var i=0;i<datas.length;i++){
							var articleUrl = datas[i];
							var arr = articleUrl.split("/");
							var articleLi = "<li class='module-list-item'><a href='generic.html?"+articleUrl+">"+arr[2]+"</a></li>";
							// <a href='generic.html?"+articleUrl+">"+arr[2]+"</a>
							recentPostBox.innerHTML += articleLi ;
						}
					},
					error:function() {
						alert("文章请求失败");
					}
				});
